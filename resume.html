<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>吳憶婷的個人履歷</title>
    <style>
        :root { --primary-color: #ff9a9e; --bg-color: #fff5f5; --text-color: #4a4a4a; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-color); color: var(--text-color); margin: 0; padding: 40px 20px; }
        .resume-card { max-width: 600px; margin: auto; background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; }
        .profile-img { width: 150px; height: 150px; border-radius: 50%; object-fit: cover; border: 5px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h1 { color: var(--primary-color); font-size: 2.5em; margin-bottom: 5px; }
        .section { margin-bottom: 25px; border-left: 4px solid var(--primary-color); padding-left: 15px; text-align: left; }
        .section-title { font-weight: bold; font-size: 1.2em; color: var(--primary-color); margin-bottom: 10px; }
        .tag { display: inline-block; background: #ffe4e6; color: #f43f5e; padding: 5px 12px; border-radius: 15px; margin: 3px; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="resume-card">
        <img src="images/me.jpg" alt="吳憶婷的照片" class="profile-img">
        <h1>吳憶婷</h1>
        <div class="section">
            <div class="section-title">✨ 個人簡介</div>
            <p>喜歡化妝與設計造型，希望未來能成為專業造型師。具備美容基礎與證照，個性活潑開朗，熱衷於協助他人完成美麗的改造。</p>
        </div>
        <div class="section">
            <div class="section-title">🏫 學歷資訊</div>
            <p>亞洲大學 - 時尚設計系 1年級 / 學號：AU114054067</p>
        </div>
    </div>
</body>
</html>
