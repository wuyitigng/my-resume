<!DOCTYPE html>

    <style>
        :root {
            --primary-color: #ff9a9e; /* 時尚粉色 */
            --bg-color: #fff5f5;
            --text-color: #4a4a4a;
        }
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            margin: 0; 
            padding: 40px 20px; 
        }
        .resume-card { 
            max-width: 600px; 
            margin: auto; 
            background: white; 
            padding: 40px; 
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            text-align: center;
        }
        
        /* 照片樣式 */
        .profile-img { 
            width: 180px; 
            height: 180px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 5px solid #fff; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); 
            margin-bottom: 20px; 
        }
        
        h1 { color: var(--primary-color); font-size: 2.5em; margin-bottom: 5px; }
        .subtitle { color: #999; margin-bottom: 30px; letter-spacing: 2px; }
        
        .section { 
            margin-bottom: 25px; 
            border-left: 4px solid var(--primary-color); 
            padding-left: 15px; 
            text-align: left; 
        }
        .section-title { 
            font-weight: bold; 
            font-size: 1.2em; 
            color: var(--primary-color); 
            margin-bottom: 10px; 
        }
        .info-item { margin: 8px 0; line-height: 1.6; }
        
        .tag { 
            display: inline-block; 
            background: #ffe4e6; 
            color: #f43f5e; 
            padding: 5px 12px; 
            border-radius: 15px; 
            margin: 3px; 
            font-size: 0.9em; 
        }
        .contact-link { color: #f43f5e; text-decoration: none; }
    </style>
</head>
